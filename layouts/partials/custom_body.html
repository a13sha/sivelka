<!-- Theme Toggle Button -->
<button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
  <svg id="themeSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="5"/>
    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
  </svg>
</button>

<script>
(function() {
  var toggle = document.getElementById('themeToggle');
  var svg = document.getElementById('themeSvg');
  var html = document.documentElement;

  var moonPath = 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z';
  var sunPaths = 'M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42';

  function setIconMoon() {
    svg.replaceChildren();
    var ns = 'http://www.w3.org/2000/svg';
    var p = document.createElementNS(ns, 'path');
    p.setAttribute('d', moonPath);
    svg.appendChild(p);
  }

  function setIconSun() {
    svg.replaceChildren();
    var ns = 'http://www.w3.org/2000/svg';
    var circle = document.createElementNS(ns, 'circle');
    circle.setAttribute('cx', '12');
    circle.setAttribute('cy', '12');
    circle.setAttribute('r', '5');
    svg.appendChild(circle);
    var p = document.createElementNS(ns, 'path');
    p.setAttribute('d', sunPaths);
    svg.appendChild(p);
  }

  function applyTheme(theme) {
    html.setAttribute('data-theme', theme);
    try { localStorage.setItem('theme', theme); } catch (e) {}
    if (theme === 'dark') setIconMoon();
    else setIconSun();
  }

  // Init — читаем уже установленный data-theme из <head> и ставим иконку
  // (весь расчёт темы уже выполнен в custom_head.html)
  var current = html.getAttribute('data-theme') || 'light';
  if (current === 'dark') setIconMoon();
  else setIconSun();

  toggle.addEventListener('click', function() {
    var cur = html.getAttribute('data-theme') || 'light';
    applyTheme(cur === 'light' ? 'dark' : 'light');
  });
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.post-content img').forEach(function(img) {
    img.setAttribute('loading', 'lazy');
  });
});
</script>
